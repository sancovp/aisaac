<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
<rect width="100%" height="100%" fill="#1e1e2e" rx="12"/>

<!-- Title -->
<text x="400" y="35" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#e8a120" text-anchor="middle" font-weight="bold">HOLOGRAPHIC WORK</text>
<text x="400" y="60" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">Every piece contains the whole. Everything is the same thing at different levels of compilation.</text>

<!-- Human Context Zone -->
<rect x="30" y="90" width="320" height="240" rx="12" fill="#1e3a5f" fill-opacity="0.3" stroke="#4a9eed" stroke-width="2"/>
<text x="50" y="115" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4a9eed" font-weight="bold">HUMAN CONTEXT</text>

<rect x="50" y="130" width="280" height="45" rx="8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1"/>
<text x="190" y="158" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">4 Billion Token Life Context</text>

<rect x="50" y="185" width="130" height="40" rx="8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1"/>
<text x="115" y="210" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">Taste</text>

<rect x="190" y="185" width="140" height="40" rx="8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1"/>
<text x="260" y="210" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">Judgment</text>

<rect x="50" y="235" width="280" height="45" rx="8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1"/>
<text x="190" y="263" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">Pattern Recognition</text>

<rect x="50" y="290" width="280" height="30" rx="8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1"/>
<text x="190" y="310" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4a9eed" text-anchor="middle">Combinatorial Prediction</text>

<!-- AI Context Zone -->
<rect x="450" y="90" width="320" height="240" rx="12" fill="#2d1b69" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
<text x="470" y="115" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#8b5cf6" font-weight="bold">AI CONTEXT</text>

<rect x="470" y="130" width="280" height="45" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
<text x="610" y="158" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">200K Token Window</text>

<rect x="470" y="185" width="130" height="40" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
<text x="535" y="210" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">Speed</text>

<rect x="610" y="185" width="140" height="40" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
<text x="680" y="210" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">Consistency</text>

<rect x="470" y="235" width="280" height="45" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
<text x="610" y="263" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e5e5e5" text-anchor="middle">24/7 Operation</text>

<rect x="470" y="290" width="280" height="30" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
<text x="610" y="310" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">Never Forgets</text>

<!-- Arrows to Compose -->
<line x1="200" y1="330" x2="360" y2="390" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrowBlue)"/>
<line x1="600" y1="330" x2="440" y2="390" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

<!-- Arrow markers -->
<defs>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/></marker>
  <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/></marker>
  <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
</defs>

<!-- Compose Diamond -->
<polygon points="400,370 460,410 400,450 340,410" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2"/>
<text x="400" y="415" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="bold">COMPOSE</text>

<!-- Arrow down -->
<line x1="400" y1="450" x2="400" y2="490" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowAmber)"/>

<!-- Output -->
<rect x="260" y="495" width="280" height="55" rx="12" fill="#1a4d2e" stroke="#22c55e" stroke-width="2"/>
<text x="400" y="528" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#22c55e" text-anchor="middle" font-weight="bold">Compound Intelligence</text>

<!-- Bottom text -->
<text x="400" y="585" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a0a0a0" text-anchor="middle" font-style="italic">Frameworks are cognitive equipment AND operational skills.</text>
<text x="400" y="605" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">The same thing at different levels of compilation.</text>
</svg>
